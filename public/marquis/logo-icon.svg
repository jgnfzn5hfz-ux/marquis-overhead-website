<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 240" width="280" height="240">
  <title>Marquis Overhead — Icon Mark</title>
  <rect width="280" height="240" fill="#0D1F35" rx="12"/>
  <!-- Ghost chevron -->
  <polyline points="50,58 140,148 230,58"
    fill="none" stroke="#F07A20" stroke-width="17"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.30"/>
  <!-- Solid chevron -->
  <polyline points="50,80 140,170 230,80"
    fill="none" stroke="#F07A20" stroke-width="17"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left stick -->
  <line x1="50" y1="80" x2="50" y2="192"
    stroke="#FFFFFF" stroke-width="17" stroke-linecap="round"/>
  <!-- Right stick -->
  <line x1="230" y1="80" x2="230" y2="192"
    stroke="#FFFFFF" stroke-width="17" stroke-linecap="round"/>
</svg>
